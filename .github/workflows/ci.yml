name: Continuous Integration

env:
  NODE_OPTIONS: --max-old-space-size=6144

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job 1: 代码格式检查
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: node scripts/ci-install-dependencies.cjs
      
      - name: Check code formatting
        run: npm run format:check
        continue-on-error: true

  # Job 2: Lint检查
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: node scripts/ci-install-dependencies.cjs
      
      - name: Run Obsidian community lint
        run: npm run lint:obsidian
        continue-on-error: false

      - name: Run Obsidian community review gate
        run: npm run lint:obsidian:community
        continue-on-error: false

      - name: Run Obsidian strict audit
        run: npm run lint:obsidian:strict
        continue-on-error: false

      - name: Run linter
        run: npm run lint:check
        continue-on-error: true
      
      - name: Check Svelte 5 Compliance
        run: npm run lint:svelte5
        continue-on-error: true

  # Job 3: TypeScript类型检查（关键）
  type-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: node scripts/ci-install-dependencies.cjs
      
      - name: Run build check
        run: npm run check
        continue-on-error: false

  # Job 4: 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: node scripts/ci-install-dependencies.cjs

      - name: Log Node.js runtime
        run: node -e "console.log('node', process.version, 'groupBy', typeof Object.groupBy)"
      
      - name: Run tests
        run: node scripts/ci-run-tests.cjs
        continue-on-error: false
      
  # Job 5: 构建验证
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: node scripts/ci-install-dependencies.cjs

      - name: Verify public repo safety
        run: npm run verify:public-repo
        continue-on-error: false
      
      - name: Build project
        run: node scripts/ci-run-build.cjs
        continue-on-error: false

      - name: Verify release assets
        run: npm run verify:release
        continue-on-error: false

      - name: Check bundle footprint
        run: npm run check:bundle-footprint
        continue-on-error: false
      
      - name: Check build size
        run: |
          if [ -f "dist/main.js" ]; then
            SIZE=$(stat -c%s "dist/main.js" 2>/dev/null || stat -f%z "dist/main.js" 2>/dev/null || echo 0)
            echo "Build size: $SIZE bytes"
            if [ $SIZE -gt 10000000 ]; then
              echo "⚠️ Warning: Build size exceeds 10MB ($SIZE bytes)"
              exit 1
            fi
            echo "✅ Build size OK: $SIZE bytes"
          else
            echo "❌ Build file not found!"
            exit 1
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # Job 6: 质量汇总
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [format-check, lint, type-check, test, build]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "📊 CI Pipeline Summary"
          echo "====================="
          echo "Format Check: ${{ needs.format-check.result }}"
          echo "Lint Check: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          
          if [[ "${{ needs.format-check.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ All Checks Passed!"
          fi
