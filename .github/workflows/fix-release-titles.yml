name: Fix GitHub Release Titles

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  fix-titles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Repair release assets and titles
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node - <<'EOF'
          (async () => {
            const token = process.env.GITHUB_TOKEN;
            const repo = process.env.GITHUB_REPOSITORY;
            const headers = {
              Authorization: `Bearer ${token}`,
              Accept: "application/vnd.github+json",
              "User-Agent": "weave-epub-reader-fix-release-titles",
            };

            let page = 1;
            let fixedTitles = 0;
            let removedAssets = 0;

            while (page <= 20) {
              const url = `https://api.github.com/repos/${repo}/releases?per_page=100&page=${page}`;
              const response = await fetch(url, { headers });
              if (!response.ok) {
                throw new Error(`Failed to list releases: ${response.status}`);
              }

              const releases = await response.json();
              if (!Array.isArray(releases) || releases.length === 0) break;

              for (const release of releases) {
                const tag = release.tag_name;
                if (!tag) continue;

                if (release.name !== tag) {
                  const patchResponse = await fetch(
                    `https://api.github.com/repos/${repo}/releases/${release.id}`,
                    {
                      method: "PATCH",
                      headers: { ...headers, "Content-Type": "application/json" },
                      body: JSON.stringify({ name: tag, tag_name: tag }),
                    }
                  );

                  if (!patchResponse.ok) {
                    throw new Error(`Failed to patch release ${tag}: ${patchResponse.status}`);
                  }

                  fixedTitles += 1;
                  console.log(`Fixed release title for ${tag}`);
                }

                for (const asset of release.assets ?? []) {
                  if (asset.name !== "versions.json") continue;

                  const deleteResponse = await fetch(
                    `https://api.github.com/repos/${repo}/releases/assets/${asset.id}`,
                    { method: "DELETE", headers }
                  );

                  if (!deleteResponse.ok) {
                    throw new Error(
                      `Failed to delete versions.json from ${tag}: ${deleteResponse.status}`
                    );
                  }

                  removedAssets += 1;
                  console.log(`Removed versions.json from ${tag}`);
                }
              }

              if (releases.length < 100) break;
              page += 1;
            }

            console.log(`Done. Updated ${fixedTitles} title(s), removed ${removedAssets} extra asset(s).`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
