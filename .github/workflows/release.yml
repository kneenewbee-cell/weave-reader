name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish or republish (e.g. 0.6.17)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build And Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-install-dependencies.cjs

      - name: Verify public repo safety
        if: github.event_name != 'workflow_dispatch'
        run: npm run verify:public-repo

      - name: Read release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ github.event.inputs.tag }}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
          fi

          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "tag=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          fi

          node -e "const versions=require('./versions.json'); const version=process.argv[1]; if (!versions[version]) { console.error('versions.json missing version ' + version); process.exit(1); }" "$TAG_VERSION"

      - name: Verify Obsidian community compliance
        run: npm run verify:obsidian-community

      - name: Run unit tests
        run: npm test

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" /tmp/release-notes.md
            echo "Loaded release notes from checked-out tag"
          else
            {
              echo "## ${TAG}"
              echo ""
              echo "Automated release for the Obsidian community plugin directory."
            } > /tmp/release-notes.md
          fi

          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release notes file is empty for ${TAG}"
            exit 1
          fi

          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        run: npm run verify:release

      - name: Verify bundle has no dynamic script injection
        run: node scripts/verify-no-dynamic-script.cjs dist/main.js

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE="${{ steps.notes.outputs.path }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Updating existing release ${TAG}..."
            gh release delete-asset "$TAG" versions.json -y 2>/dev/null || true
            gh release upload "$TAG" dist/main.js dist/manifest.json dist/styles.css --clobber
            gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              dist/main.js \
              dist/manifest.json \
              dist/styles.css
          fi

      - name: Verify remote release metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          node - <<'EOF' "$TAG"
          (async () => {
            const [tag] = process.argv.slice(2);
            const token = process.env.GITHUB_TOKEN;
            const repo = process.env.GITHUB_REPOSITORY;

            if (!tag || !token || !repo) {
              console.error("Missing tag, token, or repository context for release metadata verification.");
              process.exit(1);
            }

            const url = `https://api.github.com/repos/${repo}/releases/tags/${tag}`;
            const response = await fetch(url, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "User-Agent": "weave-epub-reader-release-check",
              },
            });

            if (!response.ok) {
              console.error(`Failed to fetch release metadata for ${tag}: ${response.status} ${response.statusText}`);
              process.exit(1);
            }

            const release = await response.json();
            if (release.name !== tag) {
              console.error(`Release title mismatch for ${tag}: expected "${tag}", got "${release.name ?? ""}"`);
              process.exit(1);
            }

            const body = (release.body ?? "").trim();
            if (!body) {
              console.error(`Release description is empty for ${tag}`);
              process.exit(1);
            }

            const assetNames = (release.assets ?? []).map((asset) => asset.name).sort();
            const expectedAssets = ["main.js", "manifest.json", "styles.css"];
            const unexpectedAssets = assetNames.filter((name) => !expectedAssets.includes(name));
            if (unexpectedAssets.length > 0) {
              console.error(`Unexpected release asset(s) for ${tag}: ${unexpectedAssets.join(", ")}`);
              process.exit(1);
            }

            const missingAssets = expectedAssets.filter((name) => !assetNames.includes(name));
            if (missingAssets.length > 0) {
              console.error(`Missing release asset(s) for ${tag}: ${missingAssets.join(", ")}`);
              process.exit(1);
            }

            console.log(`Verified release metadata for ${tag}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
